 	<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Software Department Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 60%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            background-color: #27ae60;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #219150;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Software Department Student Registration</h1>
</header>

<div class="container">

    <h2>Register Student</h2>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="id" placeholder="Student ID">
    <select id="year">
        <option value="">Select Year</option>
        <option>1st Year</option>
        <option>2nd Year</option>
        <option>3rd Year</option>
        <option>4th Year</option>
    </select>

    <button onclick="addStudent()">Register</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Year</th>
            </tr>
        </thead>
        <tbody id="studentTable">
        </tbody>
    </table>

</div>

<script>
    function addStudent() {
        let name = document.getElementById("name").value;
        let id = document.getElementById("id").value;
        let year = document.getElementById("year").value;

        if (name === "" || id === "" || year === "") {
            alert("Please fill all fields!");
            return;
        }

        let table = document.getElementById("studentTable");

        let row = table.insertRow();
        row.insertCell(0).innerText = name;
        row.insertCell(1).innerText = id;
        row.insertCell(2).innerText = year;

        document.getElementById("name").value = "";
        document.getElementById("id").value = "";
        document.getElementById("year").value = "";
    }
</script>

</body>
</html>
